name: Build Wheels

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 is Apple Silicon, macos-13 is Intel (deprecated)
        # ubuntu-24.04-arm provides native ARM64 Linux builds
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      # Install build dependencies on macOS
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config libtiff

      # Install build dependencies on Linux
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libtiff-dev

      # Build wheels using cibuildwheel
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          # Build CPython 3.8-3.13
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-*"
          # Skip 32-bit, musllinux, and PyPy
          CIBW_SKIP: "*-win32 *-manylinux_i686 pp* *-musllinux*"
          # macOS: build arm64 only (Intel runner retired)
          CIBW_ARCHS_MACOS: "arm64"
          # Set minimum macOS version
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=10.15"
          # Install dependencies before building on macOS
          CIBW_BEFORE_ALL_MACOS: "brew install cmake ninja pkg-config libtiff"
          # Install dependencies before building on Linux
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y cmake ninja-build pkgconfig libtiff-devel libjpeg-devel zlib-devel
          # Test requirements
          CIBW_TEST_REQUIRES: "pytest numpy"
          # Test command
          CIBW_TEST_COMMAND: "python -c \"from openpiv_cpp_pkg.openpiv_cpp import piv_process; print('OK')\""
          # Skip testing on cross-compiled builds
          CIBW_TEST_SKIP: "*-macosx_arm64 *-manylinux_aarch64"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  # Upload to PyPI on tagged releases
  upload_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/openpiv-cpp
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
