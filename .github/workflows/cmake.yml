name: CMake

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_DISABLE_METRICS: 1

jobs:
  build:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04-arm provides native ARM64 Linux builds
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-14]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          persist-credentials: false

      # Install Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libtiff-dev pkg-config

      # Install macOS dependencies
      # Note: xcode-select is pre-installed on GitHub Actions macOS runners
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config libtiff

      # Install Windows dependencies
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install ninja -y --no-progress

      # Bootstrap vcpkg (Linux)
      - name: Bootstrap vcpkg (Linux)
        if: runner.os == 'Linux'
        run: ./external/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      # Bootstrap vcpkg (macOS)
      # Force use of system tools (brew's cmake, ninja, etc.)
      - name: Bootstrap vcpkg (macOS)
        if: runner.os == 'macOS'
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: "1"
        run: ./external/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      # Bootstrap vcpkg (Windows)
      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: external\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      # Configure CMake with vcpkg toolchain
      - name: Configure CMake
        run: cmake -S "${{ github.workspace }}" -B "${{ github.workspace }}/build" -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} "-DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/external/vcpkg/scripts/buildsystems/vcpkg.cmake" "-DVCPKG_MANIFEST_FEATURES=tests;examples"
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ runner.os == 'macOS' && '1' || '' }}

      # Build
      - name: Build
        run: cmake --build "${{ github.workspace }}/build" --config "${{ env.BUILD_TYPE }}" --parallel

      # Test
      - name: Test
        run: ctest --test-dir "${{ github.workspace }}/build" -C "${{ env.BUILD_TYPE }}" --output-on-failure
